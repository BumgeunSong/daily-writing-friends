<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E2E Login Helper</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            line-height: 1.6;
        }
        .status {
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
            font-weight: 500;
        }
        .loading { background: #e3f2fd; color: #1976d2; }
        .success { background: #e8f5e8; color: #2e7d32; }
        .error { background: #ffebee; color: #c62828; }
        .info { background: #f3e5f5; color: #7b1fa2; }
        .params {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 3px;
            font-family: monospace;
            font-size: 12px;
            margin: 10px 0;
        }
        button {
            background: #1976d2;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 3px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover { background: #1565c0; }
        button:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>
    <h1>E2E Login Helper</h1>
    <p>This page helps Playwright authenticate users via Supabase local auth.</p>

    <div id="status" class="status loading">Initializing...</div>
    <div id="params" class="params"></div>

    <div id="actions" style="display: none;">
        <button id="emailLogin">Login with Email</button>
        <button id="logout">Logout</button>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.89.0';

        // Local Supabase configuration
        // These are the default local dev values from `supabase start`
        const SUPABASE_URL = 'http://127.0.0.1:54321';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0';

        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: {
                autoRefreshToken: true,
                persistSession: true,
            },
        });

        // Elements
        const statusDiv = document.getElementById('status');
        const paramsDiv = document.getElementById('params');
        const actionsDiv = document.getElementById('actions');

        function setStatus(message, type = 'info') {
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
            if (type === 'success') {
                document.body.setAttribute('data-auth-status', 'success');
                document.body.setAttribute('data-auth-message', message);
            } else if (type === 'error') {
                document.body.setAttribute('data-auth-status', 'error');
                document.body.setAttribute('data-auth-message', message);
            }
        }

        function displayParams() {
            const params = new URLSearchParams(window.location.search);
            const paramsList = Array.from(params.entries())
                .map(([key, value]) => `${key}: ${value}`)
                .join('\n');
            paramsDiv.textContent = paramsList || 'No parameters';
        }

        function getRequiredParam(params, name) {
            const value = params.get(name);
            if (!value) throw new Error(`Missing required parameter: ${name}`);
            return value;
        }

        async function initialize() {
            try {
                setStatus('Connecting to Supabase local...', 'loading');
                displayParams();

                const params = new URLSearchParams(window.location.search);
                const mode = params.get('mode');

                if (mode === 'email') {
                    await handleEmailLogin(params);
                } else if (mode === 'logout') {
                    await handleLogout();
                } else if (mode === 'check') {
                    await handleAuthCheck();
                } else {
                    setStatus('Ready for manual testing', 'info');
                    actionsDiv.style.display = 'block';
                    setupManualButtons();
                }
            } catch (error) {
                console.error('Initialization error:', error);
                setStatus(`Initialization failed: ${error.message}`, 'error');
            }
        }

        async function handleEmailLogin(params) {
            try {
                const email = getRequiredParam(params, 'email');
                const password = getRequiredParam(params, 'password');

                setStatus(`Signing in with email: ${email}...`, 'loading');

                const { data, error } = await supabase.auth.signInWithPassword({
                    email,
                    password,
                });

                if (error) throw error;

                setStatus(`Successfully signed in: ${data.user.email} (${data.user.id})`, 'success');
                document.body.textContent = 'OK';
            } catch (error) {
                console.error('Email login error:', error);
                setStatus(`Email login failed: ${error.message}`, 'error');
            }
        }

        async function handleLogout() {
            try {
                setStatus('Signing out...', 'loading');
                const { error } = await supabase.auth.signOut();
                if (error) throw error;
                setStatus('Successfully signed out', 'success');
                document.body.textContent = 'OK';
            } catch (error) {
                console.error('Logout error:', error);
                setStatus(`Logout failed: ${error.message}`, 'error');
            }
        }

        async function handleAuthCheck() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                setStatus(`User is signed in: ${session.user.email || session.user.id}`, 'success');
                document.body.textContent = `SIGNED_IN:${session.user.id}`;
            } else {
                setStatus('No user signed in', 'info');
                document.body.textContent = 'NOT_SIGNED_IN';
            }
        }

        function setupManualButtons() {
            document.getElementById('emailLogin').onclick = () => {
                window.location.search = '?mode=email&email=e2e@example.com&password=test1234';
            };
            document.getElementById('logout').onclick = () => {
                window.location.search = '?mode=logout';
            };
        }

        initialize();

        window.supabaseAuth = supabase;
        console.log('E2E Login Helper initialized (Supabase)');
        console.log('Available URL parameters:');
        console.log('  ?mode=email&email=e2e@example.com&password=test1234');
        console.log('  ?mode=logout');
        console.log('  ?mode=check');
    </script>
</body>
</html>
