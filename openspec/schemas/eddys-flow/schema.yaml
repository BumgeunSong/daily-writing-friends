name: eddys-flow
version: 1
description: Full lifecycle workflow with iterative reviews, verification, PR, and retro

artifacts:
  - id: proposal
    generates: proposal.md
    description: Initial proposal document outlining the change
    template: proposal.md
    instruction: >
      Create the proposal document that establishes WHY this change is needed.


      Sections:

      - **Why**: 1-2 sentences on the problem or opportunity. What problem does
      this solve? Why now?

      - **What Changes**: Bullet list of changes. Be specific about new
      capabilities, modifications, or removals. Mark breaking changes with
      **BREAKING**.

      - **Capabilities**: Identify which specs will be created or modified:
        - **New Capabilities**: List capabilities being introduced. Each becomes a new `specs/<name>/spec.md`. Use kebab-case names (e.g., `user-auth`, `data-export`).
        - **Modified Capabilities**: List existing capabilities whose REQUIREMENTS are changing. Only include if spec-level behavior changes (not just implementation details). Each needs a delta spec file. Check `openspec/specs/` for existing spec names. Leave empty if no requirement changes.
      - **Impact**: Affected code, APIs, dependencies, or systems.


      IMPORTANT: The Capabilities section is critical. It creates the contract
      between proposal and specs phases. Research existing specs before filling
      this in. Each capability listed here will need a corresponding spec file.


      Keep it concise (1-2 pages). Focus on the "why" not the "how" -
      implementation details belong in design.md.
    requires: []

  - id: proposal-review
    generates: proposal-review.md
    description: Multi-perspective review of the proposal with iterative refinement
    template: proposal-review.md
    instruction: >
      Review the proposal using parallel background agents.
      Read openspec/REVIEW_CONFIG.yaml for role-to-agent mapping.
      The goal is to ensure we are "doing the right thing" before investing in design.


      PARALLEL DISPATCH:

      For each role listed below, spawn the mapped agent from REVIEW_CONFIG.yaml
      in parallel (run_in_background: true) with the role's focus prompt as context:

      - **objectives-challenger**: Is this solving the right problem? What are we
        really trying to achieve? Are there simpler ways to get the same outcome?

      - **alternatives-explorer**: What other approaches exist? What would happen
        if we did nothing? What's the simplest version that still delivers value?

      - **user-advocate**: How does this affect the user experience? What's the
        user journey? Are there edge cases users will hit?

      Additional roles dispatched based on the change type (not always needed):

      - **scope-analyst**: (for large changes) Is the scope right-sized?
        Hidden dependencies or risks? What could go wrong?

      Wait for all agents to complete.
      Consolidate all reviewer findings into a single review document using the
      template structure. Rate severity of each finding (Critical / Important / Minor).


      ITERATIVE REFINEMENT (max 2 rounds):

      1. After the first review, if there are Critical or Important findings,
         rewrite proposal.md to address them.

      2. Re-review the updated proposal. If new Critical issues emerge, do one
         more rewrite cycle.

      3. Stop after 2 iterations maximum even if minor issues remain.
         Document any accepted trade-offs.


      The final proposal-review.md should reflect the LAST review state,
      noting which issues were addressed and which were accepted.
    requires:
      - proposal

  - id: design
    generates: design.md
    description: Technical design document with implementation details
    template: design.md
    instruction: >
      Create the design document that explains HOW to implement the change.
      The proposal has been reviewed and refined — build on it confidently.


      When to include design.md (create only if any apply):

      - Cross-cutting change (multiple services/modules) or new architectural
      pattern

      - New external dependency or significant data model changes

      - Security, performance, or migration complexity

      - Ambiguity that benefits from technical decisions before coding


      Sections:

      - **Context**: Background, current state, constraints, stakeholders

      - **Goals / Non-Goals**: What this design achieves and explicitly excludes

      - **Decisions**: Key technical choices with rationale (why X over Y?).
      Include alternatives considered for each decision.

      - **Risks / Trade-offs**: Known limitations, things that could go wrong.
      Format: [Risk] → Mitigation

      - **Migration Plan**: Steps to deploy, rollback strategy (if applicable)

      - **Open Questions**: Outstanding decisions or unknowns to resolve


      **Testability Notes** (REQUIRED section):

      Identify what needs testing BEFORE any code is written.
      For each piece of logic, decide which test layer and why:

      - Layer 1 (Unit): Pure logic with branching, edge cases, boundary values
      - Layer 2 (Integration): Boundary contracts between two layers (API↔DB, Component↔API)
      - Layer 3 (E2E Network Passthrough): Full UI flows, internal APIs use real dev server
      - Layer 4 (E2E Local DB): Only DB-dependent scenarios (RLS, triggers, data integrity)

      This ensures the implementation is designed to be testable from the start.


      Focus on architecture and approach, not line-by-line implementation.
      Reference the proposal for motivation and specs for requirements.

      Good design docs explain the "why" behind technical decisions.
      See openspec/VERIFICATION_WORKFLOW.md for the full testing philosophy.
    requires:
      - proposal-review

  - id: design-review
    generates: design-review.md
    description: Comprehensive design review using full review lane with iterative refinement
    template: design-review.md
    instruction: >
      Comprehensive design review using the full review lane as parallel agents.
      Read openspec/REVIEW_CONFIG.yaml for role-to-agent mapping.
      This is the last gate before implementation — be thorough.


      PARALLEL DISPATCH (all roles required):

      For each role below, spawn the mapped agent from REVIEW_CONFIG.yaml
      in parallel (run_in_background: true) with the role's focus prompt:

      - **architecture-reviewer**: Does the design fit existing codebase patterns
        and conventions? Are boundaries and interfaces well-defined? Are there
        better architectural approaches? Long-horizon tradeoffs?

      - **security-reviewer**: Vulnerabilities, trust boundaries, authn/authz
        gaps, injection risks, data exposure. OWASP top 10 concerns.

      - **quality-reviewer**: Logic defects, maintainability concerns,
        anti-patterns, SOLID violations, performance hotspots, complexity.

      - **testability-reviewer**: Is this design testable? What's the test
        strategy? Are there hard-to-test areas that need design changes?

      - **integration-reviewer**: API contracts, backward compatibility, naming
        consistency, integration concerns across the codebase.

      Wait for all agents to complete.
      Consolidate all findings into a single review document using the template.
      Rate severity of each finding (Critical / Important / Minor).


      ITERATIVE REFINEMENT (max 2 rounds):

      1. After the first review, if there are Critical or Important findings,
         rewrite design.md to address them.

      2. Re-review the updated design. If new Critical issues emerge, do one
         more rewrite cycle.

      3. Stop after 2 iterations maximum even if minor issues remain.
         Document any accepted trade-offs.


      The final design-review.md should reflect the LAST review state,
      noting which issues were addressed and which were accepted.
    requires:
      - design

  - id: specs
    generates: specs/**/*.md
    description: Detailed specifications for the change
    template: spec.md
    instruction: >
      Create specification files that define WHAT the system should do.
      The design has been reviewed and refined — specs should align with it.


      Create one spec file per capability listed in the proposal's Capabilities
      section.

      - New capabilities: use the exact kebab-case name from the proposal
      (specs/<capability>/spec.md).

      - Modified capabilities: use the existing spec folder name from
      openspec/specs/<capability>/ when creating the delta spec at
      specs/<capability>/spec.md.


      Delta operations (use ## headers):

      - **ADDED Requirements**: New capabilities

      - **MODIFIED Requirements**: Changed behavior - MUST include full updated
      content

      - **REMOVED Requirements**: Deprecated features - MUST include **Reason**
      and **Migration**

      - **RENAMED Requirements**: Name changes only - use FROM:/TO: format


      Format requirements:

      - Each requirement: `### Requirement: <name>` followed by description

      - Use SHALL/MUST for normative requirements (avoid should/may)

      - Each scenario: `#### Scenario: <name>` with WHEN/THEN format

      - **CRITICAL**: Scenarios MUST use exactly 4 hashtags (`####`). Using 3
      hashtags or bullets will fail silently.

      - Every requirement MUST have at least one scenario.


      MODIFIED requirements workflow:

      1. Locate the existing requirement in openspec/specs/<capability>/spec.md

      2. Copy the ENTIRE requirement block (from `### Requirement:` through all
      scenarios)

      3. Paste under `## MODIFIED Requirements` and edit to reflect new behavior

      4. Ensure header text matches exactly (whitespace-insensitive)


      Specs should be testable - each scenario is a potential test case.
    requires:
      - design-review

  - id: tasks
    generates: tasks.md
    description: Implementation checklist with trackable tasks
    template: tasks.md
    instruction: >
      Create the task list that breaks down the implementation work.


      **IMPORTANT: Follow the template below exactly.** The apply phase parses
      checkbox format to track progress. Tasks not using `- [ ]` won't be
      tracked.


      Guidelines:

      - Group related tasks under ## numbered headings

      - Each task MUST be a checkbox: `- [ ] X.Y Task description`

      - Tasks should be small enough to complete in one session

      - Order tasks by dependency (what must be done first?)


      Example:

      ```

      ## 1. Setup


      - [ ] 1.1 Create new module structure

      - [ ] 1.2 Add dependencies to package.json


      ## 2. Core Implementation


      - [ ] 2.1 Implement data export function

      - [ ] 2.2 Add CSV formatting utilities

      ```


      **Tests section** (REQUIRED):

      Every implementation task that involves business logic or a layer boundary
      MUST have a corresponding test task. Tests are completion criteria, not
      optional extras. Group test tasks by layer (Unit, Integration, E2E).
      Reference the Testability Notes from design.md to decide which tests to write.


      Reference specs for what needs to be built, design for how to build it.
      Each task should be verifiable - you know when it's done.
    requires:
      - specs
      - design

  - id: verify
    generates: verify_report.md
    description: Verification report - run tests layer by layer, stop at first failure
    template: verify.md
    instruction: >
      Execute the 4-layer test pyramid after implementation is complete.
      See openspec/VERIFICATION_WORKFLOW.md for the full testing philosophy.


      Execution order (stop and report at first layer with failures):

      1. **Unit (Layer 1)** → fastest feedback, run first

      2. **Integration (Layer 2)** → run only if Unit passes

      3. **E2E Network Passthrough (Layer 3)** → run only if Integration passes.
         Use Model-Based GUI Testing: extract state model from specs/,
         generate test paths for Transition Coverage, execute with browser automation.
         Start dev3000 before E2E tests for unified timeline capture.
         Internal APIs use real dev server (passthrough). Only external services
         (OAuth, push, email, payment) are mocked at the network level.

      4. **E2E Local DB (Layer 4)** → run only if Layer 3 passes.
         Only for DB-dependent scenarios: RLS validation, triggers, data integrity.


      For each failure, include: test name, layer, expected vs actual,
      and relevant dev3000 timeline excerpt.


      Generate artifacts:

      - verify/state_model.json (extracted from specs/)

      - verify/test_paths.json (generated from state model)

      - verify/fixtures/ (reusable mock responses)

      - verify/scenarios/ (scenario-specific mock sets)


      APPLY ↔ VERIFY LOOP:

      Read openspec/IMPLEMENTATION_CONFIG.yaml for the looper role configuration.
      Use the mapped looper agent (e.g., ultrawork or team) to drive the
      fix-and-retest cycle.

      If failures exist, add fix tasks to tasks.md, go back to apply to fix them,
      then re-run verify. Iterate until ALL layers pass.
      Max 5 iterations to prevent infinite loops. If still failing after 5,
      stop and report remaining failures with root cause analysis.


      List any spec requirements not covered by the test suite.
    requires:
      - tasks

  - id: spec-alignment
    generates: spec-alignment.md
    description: Check that implementation matches specs after apply/verify iterations
    template: spec-alignment.md
    instruction: >
      After the apply ↔ verify loop is complete and all tests pass,
      check that the implementation still aligns with the spec artifacts.


      During the apply/verify iterations, fixes and changes may have caused
      the implementation to drift from the original specs. This phase catches that.


      For each spec requirement in the change's specs/ folder:

      1. Read the requirement and its scenarios

      2. Trace the implementation to verify it matches

      3. Mark as: Aligned / Drifted / Missing


      If drift is found:

      - **Implementation drifted from spec**: Update the spec to match what was
        actually built, with a note explaining why the change was necessary.

      - **Implementation is missing a spec requirement**: Add a fix task and
        go back to apply/verify.

      - **Spec has requirements no longer needed**: Mark as REMOVED with reason.


      The goal is that specs/ are the accurate source of truth BEFORE creating
      a PR. Reviewers should be able to read specs and trust them.


      Output a summary table of all requirements and their alignment status.
    requires:
      - verify

  - id: pull-request
    generates: pull-request.md
    description: Create PR, run CI, handle review feedback with iterative fixes
    template: pull-request.md
    instruction: >
      Create a Pull Request and shepherd it through CI and code review.


      STEP 1 — CREATE PR:

      Use `gh pr create` to open a PR against the main branch.

      - Title: concise summary of the change (from proposal.md)

      - Body: start with **Why** (from proposal.md's Why section — the motivation
        for this change), then Key Changes (from design), Test Results
        (from verify_report), and Spec Alignment status.

      - Link to the change folder artifacts for reviewers who want full context.


      STEP 2 — CI CHECK:

      Wait for CI checks to complete using `gh pr checks`.

      If CI fails, diagnose the failure, fix it, push, and wait again.


      STEP 3 — CODE REVIEW LOOP (max 3 iterations):

      1. Wait for review comments using `gh pr view` and `gh api` to fetch comments.

      2. For each review comment:
         - Categorize: must-fix / suggestion / question
         - For must-fix: apply the fix, push, respond to the comment
         - For suggestion: evaluate, apply if it improves the code, explain if not
         - For question: respond with explanation

      3. After addressing all comments, request re-review.

      4. If new comments arrive, repeat (max 3 rounds total).


      STEP 4 — FINAL CHECK:

      Before marking as ready to merge:

      - All CI checks pass

      - All review comments addressed

      - No unresolved conversations

      - Spec alignment is still valid after review fixes


      Record the PR URL and final status in pull-request.md.
    requires:
      - spec-alignment

  - id: final-spec-alignment
    generates: final-spec-alignment.md
    description: Final check that specs match implementation after PR review fixes
    template: spec-alignment.md
    instruction: >
      After the pull-request review loop is complete, re-check spec alignment.


      CI fixes and code review feedback may have triggered implementation changes
      that cause specs to drift again. This final alignment check ensures specs
      remain the accurate source of truth before the PR is merged.


      For each spec requirement in the change's specs/ folder:

      1. Read the requirement and its scenarios

      2. Trace the implementation (including any review-driven changes) to verify
         it still matches

      3. Mark as: Aligned / Drifted / Missing


      If drift is found:

      - **Implementation drifted from spec**: Update the spec to match what was
        actually built, with a note explaining the review-driven change.

      - **Implementation is missing a spec requirement**: Flag it — this may
        need a follow-up PR if the review cycle is already complete.

      - **Spec has requirements no longer needed**: Mark as REMOVED with reason.


      If spec updates were made, commit and push them to the PR branch.


      Output a summary table of all requirements and their final alignment status.
      This is the last gate — specs must be trustworthy when the PR merges.
    requires:
      - pull-request

  - id: retro
    generates: retro.md
    description: Change retrospective - document wins, misses, and brainstorm improvements
    template: retro.md
    instruction: >
      Retrospective on the entire change lifecycle, from proposal through PR merge.
      This is a reflection step — document honestly, then think freely about improvements.


      STEP 1 — TIMELINE:

      Walk through each phase of this change and log what happened:
      proposal, proposal-review, design, design-review, specs, tasks,
      apply/verify loop, spec-alignment, pull-request, final-spec-alignment.
      Note key decisions, turning points, and surprises.


      STEP 2 — WINS:

      What worked well? Which phases, agents, tools, or configs contributed
      to good outcomes? Be specific about why it worked.


      STEP 3 — MISSES:

      What went wrong or was harder than expected? For each miss, identify
      the root cause category:

      - Process Gap: schema phase too light or heavy
      - Review Gap: reviewer missed something important
      - Tool Gap: test tool failed or was insufficient
      - Agent Gap: agent underperformed for the role
      - Loop Inefficiency: too many apply/verify iterations needed
      - Knowledge Gap: missing context led to wrong decisions


      STEP 4 — IMPROVEMENT IDEAS:

      Brainstorm freely about what could prevent these misses in the future.
      Think broadly — workflow changes, config adjustments, new tools,
      different agent selection, review focus areas, testing strategies,
      documentation improvements, or anything else. No constraints on format
      or scope. The goal is creative thinking, not a fixed action plan.
    requires:
      - final-spec-alignment

apply:
  requires:
    - tasks
  tracks: tasks.md
  instruction: |
    Read context files, work through pending tasks, mark complete as you go.
    Write tests alongside code, not after:
    - Unit and Integration tests: written with each function or API handler
    - E2E Network Passthrough: written after the UI component is complete
    - E2E Local DB: written after the full flow is connected end-to-end
    Pause if you hit blockers or need clarification.
