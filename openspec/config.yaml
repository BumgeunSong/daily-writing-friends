schema: reviewed

context: |
  Tech stack: TypeScript, React (Vite), Supabase (PostgreSQL + Auth), Firebase Cloud Functions
  Styling: Tailwind CSS
  Testing: Vitest + React Testing Library
  API style: Supabase client SDK (direct DB access with RLS)
  Project: DailyWritingFriends - a social writing accountability app
  See AGENTS.md for full coding conventions

rules:
  proposal-review:
    - "Read openspec/REVIEW_CONFIG.yaml to map reviewer roles to concrete agents"
    - "Dispatch all listed roles in parallel using the configured dispatch method"
  design-review:
    - "Read openspec/REVIEW_CONFIG.yaml to map reviewer roles to concrete agents"
    - "All 5 design review roles are required — dispatch all in parallel"
  design:
    - "Read openspec/VERIFICATION_CONFIG.md for the project's test toolchain"
    - "Testability Notes must reference specific tools: Vitest for Unit/Integration, agent-browser for E2E, dev3000 for timeline capture, Supabase local Docker for DB tests"
  tasks:
    - "Read openspec/VERIFICATION_CONFIG.md for the project's test toolchain"
    - "Test tasks must specify which tool runs each test: Vitest, agent-browser, or Supabase local"
  verify:
    - "Read openspec/IMPLEMENTATION_CONFIG.yaml for the looper role to drive fix-and-retest cycles"
    - "Read openspec/VERIFICATION_CONFIG.md for the project's test toolchain"
    - "Unit + Integration: run with Vitest"
    - "E2E: run with agent-browser, start dev3000 for timeline capture"
    - "E2E Local DB: use Supabase local Docker (never staging/production)"
  spec-alignment:
    - "Compare each spec requirement against the actual implementation code"
    - "Update specs to match reality — specs must be trustworthy for PR reviewers"
  pull-request:
    - "Use gh CLI for all GitHub operations (gh pr create, gh pr checks, gh api)"
    - "PR body should reference the OpenSpec change folder for full context"
    - "Address all review comments before requesting re-review"
  final-spec-alignment:
    - "Compare each spec requirement against the implementation including review-driven changes"
    - "If specs were updated, commit and push to the PR branch before merge"
